<!DOCTYPE html>
<html>
<head>
<title>Go Beyond Cafe - Customer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#fefefe;}
header{background:#3e2723;color:white;padding:15px;text-align:center;font-size:24px;}
#menuList{display:flex;flex-wrap:wrap;justify-content:center;margin:10px;}
.menu-item{border:1px solid #ddd;border-radius:12px;margin:10px;padding:10px;width:150px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.menu-item img{width:100%;height:100px;object-fit:cover;border-radius:8px;}
button{padding:8px 12px;border:none;border-radius:6px;background:#3e2723;color:white;cursor:pointer;margin-top:5px;}
#cart{position:fixed;bottom:0;right:0;background:white;padding:15px;box-shadow:0 -2px 15px rgba(0,0,0,0.1);width:300px;max-height:50%;overflow:auto;border-top-left-radius:12px;border-top-right-radius:12px;}
#cart h3{margin-top:0;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:5px;}
#placeOrder{background:#4caf50;margin-top:10px;width:100%;}
</style>
</head>
<body>
<header>Welcome to Go Beyond Cafe</header>
<div id="menuList"></div>

<div id="cart">
<h3>🛒 Your Order</h3>
<div id="cartItems"></div>
<div id="cartTotal"></div>
<button id="placeOrder">Place Order</button>
</div>

<script>
let menuData=[];
let cart=[];

/* LOAD MENU */
function loadMenu(){
  fetch("/menu").then(r=>r.json()).then(data=>{
    menuData=data;
    const div=document.getElementById("menuList");
    div.innerHTML="";
    data.forEach((item,i)=>{
      div.innerHTML+=`
        <div class="menu-item">
          <img src="${item.img}">
          <strong>${item.name}</strong>
          <div>₱${item.price}</div>
          <button onclick="addToCart(${i})">Add</button>
        </div>
      `;
    });
  });
}

/* CART LOGIC */
function addToCart(index){
  const item=menuData[index];
  const existing=cart.find(i=>i.id===item.id);
  if(existing) existing.qty+=1;
  else cart.push({...item, qty:1});
  renderCart();
}

function renderCart(){
  const div=document.getElementById("cartItems");
  div.innerHTML="";
  let total=0;
  cart.forEach(i=>{
    total+=i.price*i.qty;
    div.innerHTML+=`<div class="cart-item">${i.name} x${i.qty} <span>₱${i.price*i.qty}</span></div>`;
  });
  document.getElementById("cartTotal").innerHTML=`Total: ₱${total}`;
}

/* PLACE ORDER */
document.getElementById("placeOrder").onclick = ()=>{
  if(cart.length===0){alert("Your cart is empty"); return;}
  const customer=prompt("Enter your name:");
  if(!customer)return;
  fetch("/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
    customer,
    type:"walk-in",
    items:cart,
    total:cart.reduce((a,b)=>a+b.price*b.qty,0)
  })}).then(r=>r.json()).then(data=>{
    alert("Order placed! Thank you 😊");
    cart=[];
    renderCart();
  });
}

/* INITIAL LOAD */
loadMenu();
</script>
</body>
</html>
