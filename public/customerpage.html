
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Go Beyond Cafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f1ed;}
header{background:#3e2723;color:white;padding:20px;text-align:center;}
.screen{display:none;padding:20px;}
.screen.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;}
.card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 6px 15px rgba(0,0,0,.1);text-align:center;}
.card img{width:100%;height:150px;object-fit:cover;}
.card button{background:#c49a6c;color:white;border:none;padding:8px 16px;border-radius:8px;margin:10px 0;cursor:pointer;}
.cart{background:white;margin:20px;padding:20px;border-radius:15px;}
ul{list-style:none;padding:0;}
button.wallet{background:#4caf50;color:white;border:none;padding:8px 16px;border-radius:8px;margin:10px 5px;cursor:pointer;}
</style>
</head>
<body>

<header>
<h1>Go Beyond Cafe</h1>
<p>Mabilao, San Fabian • 8:00am - 8:00pm</p>
</header>

<!-- Welcome Screen -->
<div id="welcomeScreen" class="screen active">
<h2>Welcome to Go Beyond Cafe!</h2>
<p>Best Sellers Available!</p>
<button onclick="startOrdering()">Start Order</button>
</div>

<!-- Order Screen -->
<div id="orderScreen" class="screen">
<div class="grid" id="menu"></div>

<div class="cart">
<h3>Your Order</h3>
<input id="name" placeholder="Your Name">
<button onclick="setType('Dine In')">Dine In</button>
<button onclick="setType('Take Out')">Take Out</button>
<ul id="list"></ul>
<h3>Total: ₱<span id="total">0</span></h3>
<button onclick="checkout()">Send Order (Cash)</button>
<br>
<h4>Or Pay Online:</h4>
<button class="wallet" onclick="payWallet('GCash')">GCash</button>
<button class="wallet" onclick="payWallet('PayMaya')">PayMaya</button>
</div>
</div>

<script>
let menu=[], cart=[], total=0, type="";

function startOrdering(){
  document.getElementById("welcomeScreen").classList.remove("active");
  document.getElementById("orderScreen").classList.add("active");
  loadMenu();
}

function loadMenu(){
  fetch("/menu").then(r=>r.json()).then(data=>{
    menu=data;
    const div=document.getElementById("menu");
    div.innerHTML="";
    menu.forEach((m,i)=>{
      div.innerHTML+=`<div class="card"><img src="${m.img}"><h3>${m.name}</h3><p>₱${m.price}</p><button onclick="add(${i})">Add</button></div>`;
    });
  });
}

function add(i){
  const item=menu[i];
  const found=cart.find(x=>x.id===item.id);
  if(found) found.qty++;
  else cart.push({...item,qty:1});
  updateCart();
}

function updateCart(){
  const ul=document.getElementById("list");
  let html="";
  total=0;
  cart.forEach(c=>{
    html+=`<li>${c.name} x${c.qty} <button onclick="remove(${c.id})">-</button></li>`;
    total+=c.price*c.qty;
  });
  ul.innerHTML=html;
  document.getElementById("total").innerText=total;
}

function remove(id){
  const item=cart.find(x=>x.id===id);
  if(item.qty>1) item.qty--;
  else cart=cart.filter(x=>x.id!==id);
  updateCart();
}

function setType(t){type=t; alert("Selected: "+t);}

function checkout(){
  const customer=document.getElementById("name").value;
  if(!customer||!type||cart.length===0){alert("Fill all details"); return;}
  fetch("/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({customer,type,items:cart,total,payment:"Cash"})})
  .then(()=>{alert("Order sent!"); cart=[]; updateCart();});
}

function payWallet(wallet){
  const customer=document.getElementById("name").value;
  if(!customer||!type||cart.length===0){alert("Fill all details"); return;}
  fetch("/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({customer,type,items:cart,total,payment:wallet})})
  .then(()=>{alert("Order sent via "+wallet); cart=[]; updateCart();});
}
</script>
</body>
</html>
