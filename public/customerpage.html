<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Go Beyond Cafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f1ed;color:#333;}
header{background:#3e2723;color:white;padding:30px;text-align:center;}
header h1{margin:0;font-size:2rem;}
header p{margin:5px 0;font-size:1rem;}
.screen{display:none;padding:20px;}
.screen.active{display:block;}
#bestSellers{display:flex;gap:15px;flex-wrap:wrap;margin-top:15px;}
.best-card{background:#fff;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.1);width:150px;text-align:center;padding:10px;}
.best-card img{width:100%;height:100px;object-fit:cover;border-radius:8px;}
button{padding:8px 16px;border:none;border-radius:8px;margin-top:10px;cursor:pointer;background:#3e2723;color:white;font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;margin-top:20px;}
.card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 6px 15px rgba(0,0,0,.1);text-align:center;padding:10px;}
.card img{width:100%;height:120px;object-fit:cover;border-radius:8px;}
.cart{background:white;margin-top:20px;padding:20px;border-radius:15px;}
.cart ul{list-style:none;padding:0;margin:0;}
.cart li{display:flex;justify-content:space-between;align-items:center;margin:5px 0;}
.cart button{background:#e53935;color:white;padding:4px 8px;border-radius:6px;}
button.wallet{background:#4caf50;color:white;margin:5px;}
</style>
</head>
<body>

<header>
<h1>Go Beyond Cafe</h1>
<p>Mabilao, San Fabian • 8:00am - 8:00pm</p>
</header>

<div id="welcomeScreen" class="screen active">
<h2>Best Sellers</h2>
<div id="bestSellers"></div>
<button onclick="startOrdering()">Start Order</button>
</div>

<div id="orderScreen" class="screen">
<h2>Menu</h2>
<div class="grid" id="menu"></div>

<div class="cart">
<h3>Your Order</h3>
<input id="name" placeholder="Your Name"><br>
<button onclick="setType('Dine In')">Dine In</button>
<button onclick="setType('Take Out')">Take Out</button>
<ul id="list"></ul>
<h3>Total: ₱<span id="total">0</span></h3>

<button onclick="checkout()">Send Order (Cash)</button>
<h4>Or Pay Online:</h4>
<button class="wallet" onclick="payWallet('GCash')">GCash</button>
<button class="wallet" onclick="payWallet('PayMaya')">PayMaya</button>
</div>
</div>

<script>
let menu=[], cart=[], total=0, type="";

function startOrdering(){
  document.getElementById("welcomeScreen").classList.remove("active");
  document.getElementById("orderScreen").classList.add("active");
  loadMenu();
}

async function loadMenu(){
  const res=await fetch("/menu");
  menu=await res.json();

  const bestSellers=document.getElementById("bestSellers");
  bestSellers.innerHTML="";
  menu.filter(m=>m.best).forEach(item=>{
    const div=document.createElement("div");
    div.className="best-card";
    div.innerHTML=`<img src="${item.img}"><p>${item.name}</p><p>₱${item.price}</p>`;
    bestSellers.appendChild(div);
  });

  const container=document.getElementById("menu");
  container.innerHTML="";
  menu.forEach((m,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${m.img}"><h4>${m.name}</h4><p>₱${m.price}</p><button onclick="add(${i})">Add</button>`;
    container.appendChild(div);
  });
}

function add(i){
  let item=menu[i];
  let exist=cart.find(x=>x.id===item.id);
  if(exist) exist.qty++;
  else cart.push({...item, qty:1});
  render();
}

function render(){
  total=0;
  const list=document.getElementById("list");
  list.innerHTML="";
  cart.forEach((c,i)=>{
    total+=c.price*c.qty;
    list.innerHTML+=`<li>${c.name} x${c.qty} <button onclick="removeItem(${i})">X</button></li>`;
  });
  document.getElementById("total").innerText=total;
}

function removeItem(i){ cart.splice(i,1); render(); }
function setType(t){ type=t; }

function checkout(){ sendOrder("Cash"); }
function payWallet(method){ sendOrder(method); }

function sendOrder(payment){
  const name=document.getElementById("name").value;
  if(!name || cart.length==0 || !type){ alert("Complete name, order and type"); return; }
  if(payment!=="Cash" && !confirm(`Pay ₱${total} via ${payment}?`)) return;

  fetch("/order",{method:"POST",headers:{"Content-Type":"application/json"},
    body: JSON.stringify({customer:name,type,items:cart,total,payment})})
    .then(()=>{alert(`Order sent! Payment: ${payment}`); cart=[]; render();});
}
</script>
</body>
</html>
