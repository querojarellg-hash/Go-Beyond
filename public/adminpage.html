<!DOCTYPE html>
<html>
<head>
<title>Admin - Go Beyond Cafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9;}
#loginForm{width:320px;margin:150px auto;background:white;padding:35px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);text-align:center;}
#loginForm input{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:1px solid #ccc;}
#loginForm button{width:100%;padding:10px;border:none;border-radius:6px;background:#3e2723;color:white;cursor:pointer;}
#dashboard{display:flex;height:100vh;display:none;}
#sidebar{width:70px;background:#3e2723;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
#sidebar button.sidebar-btn{width:50px;height:50px;margin:10px 0;border:none;border-radius:10px;background:#4e342e;color:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
#sidebar button.sidebar-btn:hover{background:#6d4c41;}
#mainContent{flex:1;padding:20px;overflow-y:auto;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);display:none;}
input,select{padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ddd;width:100%;}
button.primary{background:#3e2723;color:white;} button.danger{background:#e53935;color:white;} button.success{background:#4caf50;color:white;}
.menu-item{display:flex;align-items:center;justify-content:space-between;margin:10px 0;padding:10px;border-bottom:1px solid #eee;}
.menu-item img{width:60px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.flex{display:flex;align-items:center;}
.order-actions button{margin-right:5px;padding:5px 10px;border:none;border-radius:5px;cursor:pointer;color:white;}
.order-actions .accept{background:#4caf50;} .order-actions .reject{background:#e53935;} .order-actions .done{background:#3e2723;}
</style>
</head>
<body>
<div id="loginForm">
<h2>Go Beyond Cafe Admin</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password"><br>
<button class="primary" onclick="login()">Login</button>
</div>

<div id="dashboard">
<div id="sidebar">
<button class="sidebar-btn" onclick="toggleSidebar()">☰</button>
<button class="sidebar-btn" onclick="showSection('ordersSection')">🛎</button>
<button class="sidebar-btn" onclick="showSection('menuListSection')">📋</button>
<button class="sidebar-btn" onclick="showSection('addSection')">➕</button>
<button class="sidebar-btn" onclick="showSection('recordSection')">🧾</button>
<button class="sidebar-btn" onclick="showSection('profileSection')">⚙️</button>
</div>
<div id="mainContent">

<div id="ordersSection" class="card">
<h3>🧾 New Orders</h3>
<div id="orders"></div>
</div>

<div id="addSection" class="card">
<h3>➕ Add Menu Item</h3>
<input id="name" placeholder="Item Name">
<input id="price" type="number" placeholder="Price">
<input type="file" id="imgFile" accept="image/*">
<input id="imgUrl" placeholder="Or paste image URL">
<button class="primary" onclick="addMenu()">Add Item</button>
<div id="menuList"></div>
</div>

<div id="menuListSection" class="card">
<h3>📋 Menu List</h3>
<div id="menuListMain"></div>
</div>

<div id="recordSection" class="card">
<h3>✅ Records of Orders</h3>
<select onchange="filterRecords(this.value)">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">Last Week</option>
<option value="month">Last Month</option>
</select>
<div id="doneOrders"></div>
</div>

<div id="profileSection" class="card">
<h3>Profile Settings</h3>
<input id="newPass" type="password" placeholder="New Password">
<button class="primary" onclick="changePassword()">Change Password</button><br><br>
<button class="danger" onclick="logout()">Logout</button>
</div>

</div></div>

<script>
let token=localStorage.getItem("token"); let doneData=[];
function login(){
const username=document.getElementById("username").value; const password=document.getElementById("password").value;
fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})})
.then(r=>r.json()).then(data=>{ if(data.token){token=data.token;localStorage.setItem("token",token);showDashboard();} else alert("Login failed");});}
function showDashboard(){document.getElementById("loginForm").style.display="none";document.getElementById("dashboard").style.display="flex";loadMenu();loadDoneOrders();loadOrders();showSection('ordersSection');}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function showSection(id){document.querySelectorAll('.card').forEach(c=>c.style.display='none');document.getElementById(id).style.display='block';}
function loadOrders(){fetch("/orders",{headers:{Authorization:token}}).then(r=>r.json()).then(data=>{const div=document.getElementById("orders");div.innerHTML="";data.forEach(o=>{let items=o.items.map(i=>i.name+" x"+i.qty).join(", ");div.innerHTML+=`<div class="menu-item"><div>${o.customer} (${o.type})<br>${items}<br>₱${o.total}</div><div class="order-actions"><button class="done" onclick="markDone(${o.id})">Done</button></div></div>`;});});}
function markDone(id){fetch("/order/done/"+id,{method:"POST",headers:{Authorization:token}}).then(()=>{loadOrders();loadDoneOrders();});}
function loadMenu(){fetch("/menu").then(r=>r.json()).then(data=>{const div=document.getElementById("menuListMain");div.innerHTML="";data.forEach(m=>{div.innerHTML+=`<div class="menu-item"><div class="flex"><img src="${m.img}"><span>${m.name} ₱${m.price}</span></div><button class="danger" onclick="deleteMenu(${m.id})">Delete</button></div>`;});});}
function addMenu(){let name=document.getElementById("name").value; let price=document.getElementById("price").value; let url=document.getElementById("imgUrl").value; if(!url){alert("Image required"); return;} fetch("/menu",{method:"POST",headers:{Authorization:token,"Content-Type":"application/json"},body:JSON.stringify({name,price,img:url})}).then(()=>{loadMenu();document.getElementById("name").value="";document.getElementById("price").value="";document.getElementById("imgUrl").value="";});}
function deleteMenu(id){fetch("/menu/"+id,{method:"DELETE",headers:{Authorization:token}}).then(()=>{loadMenu();});}
function loadDoneOrders(){fetch("/orders-done",{headers:{Authorization:token}}).then(r=>r.json()).then(data=>{doneData=data;filterRecords('all');});}
function filterRecords(type){let div=document.getElementById("doneOrders");div.innerHTML="";let now=new Date();let filtered=doneData.filter(o=>{let d=new Date(o.createdAt); if(type==='today') return d.toDateString()===now.toDateString(); if(type==='week'){let diff=(now-d)/86400000; return diff<=7;} if(type==='month'){let diff=(now-d)/86400000; return diff<=30;} return true;});filtered.forEach(o=>{let items=o.items.map(i=>i.name+" x"+i.qty).join(", ");div.innerHTML+=`<div>${o.customer} (${o.type}) - ₱${o.total}<br>${items}<br>${new Date(o.createdAt).toLocaleString()}</div>`;});}
function changePassword(){let pass=document.getElementById("newPass").value;fetch("/change-password",{method:"POST",headers:{Authorization:token,"Content-Type":"application/json"},body:JSON.stringify({password:pass})}).then(r=>r.json()).then(d=>{alert(d.msg);document.getElementById("newPass").value="";});}
function logout(){localStorage.removeItem("token");location.reload();}
if(token){showDashboard();}
</script>

</body>
</html>
