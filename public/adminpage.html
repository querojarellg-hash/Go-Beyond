<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Go Beyond Cafe - Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9;}
#dashboard{display:flex;height:100vh;}
#sidebar{width:80px;background:#3e2723;color:white;display:flex;flex-direction:column;align-items:center;padding-top:20px;position:relative;}
#sidebar h2{font-size:14px;margin-bottom:30px;text-align:center;}
.sidebar-btn{width:100%;padding:15px 0;text-align:center;cursor:pointer;color:white;font-size:22px;display:flex;align-items:center;justify-content:center;transition:0.3s;border-radius:0;}
.sidebar-btn.active{background:white;color:#3e2723;font-weight:bold;}
.sidebar-btn:hover{background:#6d4c41;}
#mainContent{flex:1;padding:20px;overflow-y:auto;background:white;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);}
button.primary{background:#3e2723;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
button.danger{background:#e53935;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
button.success{background:#4caf50;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
.menu-item{display:flex;align-items:center;justify-content:space-between;margin:10px 0;padding:10px;border-bottom:1px solid #eee;}
.menu-item img{width:60px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.flex{display:flex;align-items:center;}
input[type=text],input[type=number]{padding:6px 8px;margin:4px;border-radius:6px;border:1px solid #ccc;width:150px;}
input[type=file]{margin:4px;}
.filter-btns button{margin:0 4px;padding:6px 10px;border-radius:6px;border:none;background:#3e2723;color:white;cursor:pointer;}
.filter-btns button.active{background:#6d4c41;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginForm" style="max-width:350px;margin:80px auto;padding:30px;background:white;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.1);text-align:center;">
  <h2>Go Beyond Cafe Admin</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button class="primary" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
<div id="sidebar">
  <h2>Go Beyond Cafe</h2>
  <div class="sidebar-btn active" onclick="showSection('todayOrders',this)">🧾 Orders Today</div>
  <div class="sidebar-btn" onclick="showSection('profileSection',this)">⚙️ Profile</div>
  <div class="sidebar-btn" onclick="showSection('addSection',this)">➕ Add Item</div>
  <div class="sidebar-btn" onclick="showSection('qrSection',this)">📱 QR Code</div>
</div>

<div id="mainContent">
<!-- Orders Today -->
<div id="todayOrders" class="card">
<h3>📋 Orders Today</h3>
<div id="ordersToday"></div>
</div>

<!-- Profile -->
<div id="profileSection" class="card" style="display:none">
<h3>Profile Settings</h3>
<input id="newPass" type="password" placeholder="New Password">
<button class="primary" onclick="changePassword()">Change Password</button><br><br>
<button class="danger" onclick="logout()">Logout</button>
</div>

<!-- Add Menu -->
<div id="addSection" class="card" style="display:none">
<h3>➕ Add Menu Item</h3>
<input id="name" placeholder="Item Name">
<input id="price" type="number" placeholder="Price">
<input type="file" id="imgFile" accept="image/*">
<input id="imgUrl" placeholder="Or paste image URL"><br>
<label><input type="checkbox" id="bestSeller"> Best Seller</label>
<button class="primary" onclick="addMenu()">Add Item</button>
</div>

<!-- QR Code -->
<div id="qrSection" class="card" style="display:none">
<h3>📱 QR Code</h3>
<img id="qrImage" width="200"><br><br>
<button class="primary" onclick="generateQR()">Refresh QR</button>
</div>
</div>
</div>

<script>
let token=localStorage.getItem("token");
let menuData=[];

// LOGIN
function login(){
  const username=document.getElementById("username").value;
  const password=document.getElementById("password").value;
  fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})})
  .then(r=>r.json()).then(data=>{ 
    if(data.token){token=data.token; localStorage.setItem("token",token); showDashboard();} 
    else alert("Login failed"); 
  });
}

// DASHBOARD
function showDashboard(){
  document.getElementById("loginForm").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  showSection('todayOrders',document.querySelector('.sidebar-btn.active'));
  loadOrdersToday();
}
function showSection(id,btn){
  // Hide all
  ['todayOrders','profileSection','addSection','qrSection'].forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(id).style.display='block';
  // sidebar active
  document.querySelectorAll('.sidebar-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

// LOGOUT
function logout(){localStorage.removeItem("token"); location.reload();}

// PROFILE
function changePassword(){ 
  const newPass=document.getElementById("newPass").value; 
  fetch("/change-password",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({password:newPass})})
  .then(()=>alert("Password changed"));
}

// MENU
async function addMenu(){
  let img="";
  if(document.getElementById("imgFile").files[0]) img=await toBase64(document.getElementById("imgFile").files[0]);
  else if(document.getElementById("imgUrl").value) img=document.getElementById("imgUrl").value;
  else {alert("Add image"); return;}
  const best = document.getElementById("bestSeller").checked;
  fetch("/menu",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({name:document.getElementById("name").value,price:document.getElementById("price").value,img,best})});
}
function toBase64(file){return new Promise(res=>{let reader=new FileReader();reader.readAsDataURL(file);reader.onload=()=>res(reader.result);});}

// ORDERS TODAY
function loadOrdersToday(){ 
  fetch("/orders?filter=today",{headers:{Authorization:token}}).then(r=>r.json()).then(data=>{ 
    const div=document.getElementById("ordersToday"); div.innerHTML=""; 
    data.forEach(order=>{ 
      let items=""; order.items.forEach(i=>items+=`${i.name} x${i.qty}<br>`); 
      div.innerHTML+=`<div class="card"><strong>${order.customer}</strong><br>${items}Total: ₱${order.total}<br><small>${order.time}</small><br><button class="success" onclick="markDone(${order.id})">Mark as Done</button></div>`; 
    }); 
  });
}
function markDone(id){
  fetch("/order/status/"+id,{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({status:'done'})})
  .then(()=>loadOrdersToday());
}

// QR
function generateQR(){
  const qrData=window.location.origin+"/";
  document.getElementById("qrImage").src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(qrData);
}

if(token) showDashboard();
</script>
</body>
</html>
