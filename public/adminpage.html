<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Go Beyond Cafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9;}
header{background:#3e2723;color:white;padding:15px 25px;display:flex;justify-content:space-between;align-items:center;}
header h2{margin:0;font-weight:600}
.header-buttons{display:flex;gap:10px}

button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:500}
.primary{background:#3e2723;color:white}
.danger{background:#e53935;color:white}
.success{background:#4caf50;color:white}
.gray{background:#9e9e9e;color:white}

.container{padding:20px;max-width:1100px;margin:auto;display:none;}

.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,.07);}

input,select{
padding:10px;margin:5px 0;border-radius:6px;
border:1px solid #ddd;width:100%;
}

.menu-item{
display:flex;justify-content:space-between;
align-items:center;margin-bottom:10px;
padding:10px;border-bottom:1px solid #eee;
}

.menu-item img{
width:60px;height:50px;
object-fit:cover;border-radius:6px;margin-right:10px;
}

.flex{display:flex;align-items:center;gap:10px}

.login-card{
background:white;padding:35px;border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
width:320px;margin:120px auto;
text-align:center;
}

.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);justify-content:center;align-items:center;
}

.modal-content{
background:white;padding:25px;border-radius:12px;width:300px;
}
</style>
</head>
<body>

<header>
<h2>Go Beyond Cafe - Admin</h2>
<div class="header-buttons">
<button class="gray" onclick="toggleClean()">Clean Mode</button>
<button class="primary" onclick="openProfile()">Profile</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginForm" class="login-card">
<h2>Admin Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">

<div id="qrSection" class="card">
<h3>📱 Scan to Order</h3>
<img id="qrImage" width="200"><br><br>
<button class="primary" onclick="downloadQR()">Save QR Code</button>
</div>

<div class="card">
<h3>🧾 New Orders</h3>
<div id="orders"></div>
</div>

<div class="card">
<h3>📋 Menu List</h3>
<div id="menuList"></div>
</div>

<div id="addSection" class="card">
<h3>➕ Add Menu Item</h3>
<input id="name" placeholder="Item Name">
<input id="price" type="number" placeholder="Price">
<input type="file" id="imgFile" accept="image/*">
<input id="imgUrl" placeholder="Or paste image URL">
<button class="primary" onclick="addMenu()">Add Item</button>
</div>

<div id="recordSection" class="card">
<h3>
✅ Records 
<button class="gray" onclick="toggleRecords()">Show / Hide</button>
</h3>

<select onchange="filterRecords(this.value)">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">Last Week</option>
<option value="month">Last Month</option>
</select>

<div id="doneOrders"></div>
</div>

</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal">
<div class="modal-content">
<h3>Profile Settings</h3>
<input id="newPass" type="password" placeholder="New Password">
<button class="primary" onclick="changePassword()">Change Password</button>
<br><br>
<button class="danger" onclick="logout()">Logout</button>
<br><br>
<button class="gray" onclick="closeProfile()">Close</button>
</div>
</div>

<script>
let token = localStorage.getItem("token");
let cleanMode=false;

/* LOGIN */
function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username.value,
password:password.value
})
})
.then(r=>r.json())
.then(data=>{
if(data.token){
token=data.token;
localStorage.setItem("token",token);
showDashboard();
}else alert("Login failed");
});
}

function logout(){
localStorage.removeItem("token");
location.reload();
}

function showDashboard(){
loginForm.style.display="none";
dashboard.style.display="block";
initDashboard();
}

/* PROFILE */
function openProfile(){profileModal.style.display="flex";}
function closeProfile(){profileModal.style.display="none";}

function changePassword(){
fetch("/change-password",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({password:newPass.value})
}).then(()=>alert("Password changed"));
}

/* CLEAN MODE */
function toggleClean(){
cleanMode=!cleanMode;
qrSection.style.display=cleanMode?"none":"block";
addSection.style.display=cleanMode?"none":"block";
recordSection.style.display=cleanMode?"none":"block";
}

/* RECORD TOGGLE */
function toggleRecords(){
doneOrders.style.display=
doneOrders.style.display==="none"?"block":"none";
}

/* QR */
function generateQR(){
qrImage.src=
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+
encodeURIComponent("https://go-beyond.onrender.com/customerpage.html");
}

function downloadQR(){
const link=document.createElement("a");
link.href=qrImage.src;
link.download="GoBeyondCafe-QR.png";
link.click();
}

/* MENU */
function loadMenu(){
fetch("/menu")
.then(r=>r.json())
.then(data=>{
menuList.innerHTML="";
data.forEach(item=>{
menuList.innerHTML+=`
<div class="menu-item">
<div class="flex">
<img src="${item.img}">
<span>${item.name} - ₱${item.price}</span>
</div>
</div>`;
});
});
}

async function addMenu(){
let img="";
if(imgFile.files[0]){
img=await toBase64(imgFile.files[0]);
}else if(imgUrl.value){
img=imgUrl.value;
}else{alert("Add image");return;}

fetch("/menu",{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":token},
body:JSON.stringify({name:name.value,price:price.value,img})
}).then(loadMenu);
}

function toBase64(file){
return new Promise((res,rej)=>{
let reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>res(reader.result);
});
}

/* ORDERS */
function loadOrders(){
fetch("/orders",{headers:{Authorization:token}})
.then(r=>r.json())
.then(data=>{
orders.innerHTML="";
data.forEach(order=>{
let items="";
order.items.forEach(i=>items+=`${i.name} x${i.qty}<br>`);
orders.innerHTML+=`
<div class="card">
<strong>${order.customer}</strong><br>
${items}
₱${order.total}
</div>`;
});
});
}

function loadDoneOrders(){
fetch("/orders-done",{headers:{Authorization:token}})
.then(r=>r.json())
.then(data=>{
doneOrders.innerHTML="";
data.forEach(order=>{
doneOrders.innerHTML+=`
<div class="card">
<strong>${order.customer}</strong>
₱${order.total}
</div>`;
});
});
}

/* FILTER (basic front filter) */
function filterRecords(type){
loadDoneOrders(); // you can improve backend filtering later
}

/* INIT */
function initDashboard(){
generateQR();
loadMenu();
loadOrders();
loadDoneOrders();
setInterval(loadOrders,3000);
}

if(token) showDashboard();
</script>

</body>
</html>
