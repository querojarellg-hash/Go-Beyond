<!DOCTYPE html>
<html>
<head>
<title>Go Beyond Cafe - Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9;}
#loginBox{max-width:350px;margin:120px auto;background:white;padding:30px;border-radius:12px;text-align:center;box-shadow:0 8px 25px rgba(0,0,0,.1);}
#dashboard{display:none;height:100vh;display:flex;}
#sidebar{width:70px;background:#3e2723;color:white;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
.sidebar-btn{width:50px;height:50px;margin:10px;border:none;border-radius:10px;background:#4e342e;color:white;font-size:20px;cursor:pointer;}
.sidebar-btn:hover{background:#6d4c41;}
#main{flex:1;padding:20px;overflow:auto;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,.08);}
button{background:#3e2723;color:white;border:none;padding:8px 12px;border-radius:6px;margin:4px;cursor:pointer;}
button.danger{background:#e53935;}
button.success{background:#43a047;}
input,select{padding:8px;margin:5px 0;width:100%;}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;}
.menu-item img{width:60px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.hidden{display:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<div id="sidebar">
<button class="sidebar-btn" onclick="showSection('orders')">🧾</button>
<button class="sidebar-btn" onclick="showSection('addMenu')">➕</button>
<button class="sidebar-btn" onclick="showSection('records')">📊</button>
<button class="sidebar-btn" onclick="showSection('settings')">⚙️</button>
</div>

<div id="main">

<!-- NEW ORDERS -->
<div id="orders" class="card">
<h3>New Orders</h3>
<div id="orderList"></div>
</div>

<!-- ADD MENU -->
<div id="addMenu" class="card hidden">
<h3>Add Menu Item</h3>
<input id="mName" placeholder="Item Name">
<input id="mPrice" type="number" placeholder="Price">
<input type="file" id="mFile">
<input id="mUrl" placeholder="Or Image URL">
<button onclick="addMenu()">Add</button>
<h3>Menu List</h3>
<div id="menuList"></div>
</div>

<!-- RECORDS -->
<div id="records" class="card hidden">
<h3>Order Records</h3>
<select onchange="filterRecords(this.value)">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">Last 7 Days</option>
<option value="month">Last 30 Days</option>
</select>
<div id="recordList"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="card hidden">
<h3>QR Code</h3>
<img id="qr" width="200"><br>
<button onclick="downloadQR()">Download QR</button>

<h3>Change Password</h3>
<input id="newPass" type="password" placeholder="New Password">
<button onclick="changePass()">Update</button>

<br><br>
<button class="danger" onclick="logout()">Logout</button>
</div>

</div>
</div>

<script>
let token="";
let recordsData=[];

/* LOGIN */
function login(){
fetch("/login",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:username.value,password:password.value})})
.then(r=>r.json()).then(d=>{
if(d.token){
token=d.token;
loginBox.style.display="none";
dashboard.style.display="flex";
generateQR();
loadOrders();
loadMenu();
loadRecords();
setInterval(loadOrders,3000);
}else alert("Login Failed");
});
}

/* NAVIGATION */
function showSection(id){
["orders","addMenu","records","settings"].forEach(s=>{
document.getElementById(s).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* QR */
function generateQR(){
const url=window.location.origin;
qr.src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(url);
}
function downloadQR(){
const a=document.createElement("a");
a.href=qr.src;
a.download="GoBeyondCafeQR.png";
a.click();
}

/* ORDERS */
function loadOrders(){
fetch("/orders",{headers:{Authorization:token}})
.then(r=>r.json()).then(data=>{
orderList.innerHTML="";
data.forEach(o=>{
let items="";
o.items.forEach(i=>items+=`${i.name} x${i.qty}<br>`);
orderList.innerHTML+=`
<div class="card">
<strong>${o.customer}</strong><br>
${items}
Total: ₱${o.total}<br>
<button class="success" onclick="action('accept',${o.id})">Accept</button>
<button class="danger" onclick="action('reject',${o.id})">Reject</button>
<button onclick="action('done',${o.id})">Done</button>
</div>`;
});
});
}
function action(type,id){
fetch(`/order/${type}/${id}`,{method:"POST",headers:{Authorization:token}})
.then(()=>{loadOrders();loadRecords();});
}

/* MENU */
async function addMenu(){
let img="";
if(mFile.files[0]){
img=await toBase64(mFile.files[0]);
}else if(mUrl.value){
img=mUrl.value;
}else{alert("Add image");return;}

fetch("/menu",{method:"POST",
headers:{"Content-Type":"application/json",Authorization:token},
body:JSON.stringify({name:mName.value,price:mPrice.value,img})})
.then(()=>loadMenu());
}

function toBase64(file){
return new Promise(res=>{
let reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>res(reader.result);
});
}

function loadMenu(){
fetch("/menu").then(r=>r.json()).then(data=>{
menuList.innerHTML="";
data.forEach(m=>{
menuList.innerHTML+=`
<div class="menu-item">
<div><img src="${m.img}"> ${m.name} - ₱${m.price}</div>
<button class="danger" onclick="deleteMenu(${m.id})">Delete</button>
</div>`;
});
});
}

function deleteMenu(id){
fetch("/menu/"+id,{method:"DELETE",headers:{Authorization:token}})
.then(()=>loadMenu());
}

/* RECORDS */
function loadRecords(){
fetch("/records",{headers:{Authorization:token}})
.then(r=>r.json()).then(data=>{
recordsData=data;
displayRecords("all");
});
}

function filterRecords(type){displayRecords(type);}

function displayRecords(type){
recordList.innerHTML="";
let now=new Date();
recordsData.forEach(r=>{
let date=new Date(r.createdAt);
let show=true;
if(type==="today") show=date.toDateString()===now.toDateString();
if(type==="week"){let d=new Date();d.setDate(now.getDate()-7);show=date>=d;}
if(type==="month"){let d=new Date();d.setDate(now.getDate()-30);show=date>=d;}
if(show){
recordList.innerHTML+=`
<div class="card">
${r.customer} - ₱${r.total} - ${r.status}
</div>`;
}
});
}

/* PROFILE */
function changePass(){
fetch("/change-password",{method:"POST",
headers:{"Content-Type":"application/json",Authorization:token},
body:JSON.stringify({password:newPass.value})})
.then(()=>alert("Password Updated"));
}

function logout(){
location.reload();
}
</script>

</body>
</html>
