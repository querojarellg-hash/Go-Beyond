<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Go Beyond Cafe - Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9;text-align:center;}
/* LOGIN */
#loginForm{max-width:350px;margin:80px auto;padding:30px;background:white;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.1);}
#loginForm h2{margin-bottom:20px;}
#loginForm input{width:90%;padding:8px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
#loginForm button{background:#3e2723;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;}
/* DASHBOARD */
#dashboard{display:flex;height:100vh;display:none;}
#sidebar{width:70px;background:#3e2723;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
.sidebar-btn{width:50px;height:50px;margin:10px 0;border:none;border-radius:10px;background:#4e342e;color:white;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;position:relative;}
.sidebar-btn:hover{background:#6d4c41;}
.sidebar-btn span.tooltip{visibility:hidden;width:120px;background:#3e2723;color:white;text-align:center;border-radius:6px;padding:5px 0;position:absolute;left:60px;top:50%;transform:translateY(-50%);font-size:12px;z-index:1;}
.sidebar-btn:hover span.tooltip{visibility:visible;}
#sidebarButtons{display:none;flex-direction:column;align-items:center;}
#mainContent{flex:1;padding:20px;overflow-y:auto;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);}
button.primary{background:#3e2723;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
button.danger{background:#e53935;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
button.success{background:#4caf50;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
.menu-item{display:flex;align-items:center;justify-content:space-between;margin:10px 0;padding:10px;border-bottom:1px solid #eee;}
.menu-item img{width:60px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.flex{display:flex;align-items:center;}
input[type=text],input[type=number]{padding:6px 8px;margin:4px;border-radius:6px;border:1px solid #ccc;width:150px;}
input[type=file]{margin:4px;}
/* Orders table */
#orders table{width:100%;border-collapse:collapse;}
#orders th, #orders td{border:1px solid #ddd;padding:8px;text-align:left;}
#orders th{background:#f4f4f4;}
.filter-btns button{margin:0 4px;padding:6px 10px;border-radius:6px;border:none;background:#3e2723;color:white;cursor:pointer;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginForm">
  <h2>Go Beyond Cafe Admin</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button class="primary" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<div id="sidebar">
  <button class="sidebar-btn" onclick="toggleSidebarMenu()">☰<span class="tooltip">Menu</span></button>
  <div id="sidebarButtons">
    <button class="sidebar-btn" onclick="showSection('profileSection')">⚙️<span class="tooltip">Profile</span></button>
    <button class="sidebar-btn" onclick="showSection('addSection')">➕<span class="tooltip">Add Menu</span></button>
    <button class="sidebar-btn" onclick="showSection('recordSection')">🧾<span class="tooltip">Orders</span></button>
  </div>
</div>

<div id="mainContent">
<!-- Profile -->
<div id="profileSection" class="card" style="display:none">
<h3>Profile Settings</h3>
<input id="newPass" type="password" placeholder="New Password">
<button class="primary" onclick="changePassword()">Change Password</button><br><br>
<button class="danger" onclick="logout()">Logout</button>
</div>

<!-- Add Menu -->
<div id="addSection" class="card" style="display:none">
<h3>➕ Add Menu Item</h3>
<input id="name" placeholder="Item Name">
<input id="price" type="number" placeholder="Price">
<input type="file" id="imgFile" accept="image/*">
<input id="imgUrl" placeholder="Or paste image URL"><br>
<label><input type="checkbox" id="bestSeller"> Best Seller</label>
<button class="primary" onclick="addMenu()">Add Item</button>
</div>

<!-- Orders -->
<div id="recordSection" class="card" style="display:none">
<h3>✅ Orders</h3>
<div class="filter-btns">
<button onclick="loadOrders('today')">Today</button>
<button onclick="loadOrders('lastweek')">Last Week</button>
<button onclick="loadOrders('lastmonth')">Last Month</button>
</div>
<div id="orders"></div>
</div>

<!-- Menu List -->
<div id="menuListSection" class="card">
<h3>📋 Menu List</h3>
<div id="menuListMain"></div>
</div>
</div>
</div>

<script>
let token=localStorage.getItem("token");
let sidebarVisible=false;
let menuData=[];

// LOGIN
function login(){
  const username=document.getElementById("username").value;
  const password=document.getElementById("password").value;
  fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})})
  .then(r=>r.json()).then(data=>{ 
    if(data.token){token=data.token; localStorage.setItem("token",token); showDashboard();} 
    else alert("Login failed"); 
  });
}

// DASHBOARD DISPLAY
function showDashboard(){
  document.getElementById("loginForm").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  toggleSidebarMenu();
  hideAllSections();
  loadMenu();
  loadOrders('today');
}
function toggleSidebarMenu(){sidebarVisible=!sidebarVisible; document.getElementById("sidebarButtons").style.display=sidebarVisible?"flex":"none";}
function showSection(id){hideAllSections(); document.getElementById(id).style.display="block";}
function hideAllSections(){['profileSection','addSection','recordSection'].forEach(s=>document.getElementById(s).style.display="none");}

// CHANGE PASSWORD
function changePassword(){ 
  const newPass=document.getElementById("newPass").value; 
  fetch("/change-password",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({password:newPass})})
  .then(()=>alert("Password changed"));
}

// LOGOUT
function logout(){localStorage.removeItem("token"); location.reload();}

// MENU FUNCTIONS
async function addMenu(){
  let img="";
  if(document.getElementById("imgFile").files[0]) img=await toBase64(document.getElementById("imgFile").files[0]);
  else if(document.getElementById("imgUrl").value) img=document.getElementById("imgUrl").value;
  else {alert("Add image"); return;}
  const best = document.getElementById("bestSeller").checked;
  fetch("/menu",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({name:document.getElementById("name").value,price:document.getElementById("price").value,img,best})}).then(loadMenu);
}
function toBase64(file){return new Promise(res=>{let reader=new FileReader();reader.readAsDataURL(file);reader.onload=()=>res(reader.result);});}
function loadMenu(){ fetch("/menu").then(r=>r.json()).then(data=>{menuData=data; const div=document.getElementById("menuListMain"); div.innerHTML=""; data.forEach(item=>{ 
div.innerHTML+=`<div class="menu-item"><div class="flex"><img src="${item.img}"><span>${item.name} - ₱${item.price}</span></div><div><label>Best <input type="checkbox" ${item.best?'checked':''} onchange="toggleBest(${item.id},this.checked)"></label><button class="danger" onclick="deleteMenu(${item.id})">Delete</button></div></div>`; 
}); });}
function toggleBest(id,best){fetch("/menu/best/"+id,{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({best})}).then(loadMenu);}
function deleteMenu(id){fetch("/menu/"+id,{method:"DELETE",headers:{Authorization:token}}).then(loadMenu);}

// ORDERS FUNCTIONS
function loadOrders(filter="today"){ 
  fetch("/orders?filter="+filter,{headers:{Authorization:token}}).then(r=>r.json()).then(data=>{ 
    const div=document.getElementById("orders"); div.innerHTML=""; 
    data.forEach(order=>{ 
      let items=""; order.items.forEach(i=>items+=`${i.name} x${i.qty}<br>`); 
      div.innerHTML+=`<div class="card"><strong>${order.customer}</strong><br>${items}Total: ₱${order.total}<br><small>${order.time}</small><br><button class="success" onclick="updateOrder(${order.id},'done')">Done</button><button class="danger" onclick="updateOrder(${order.id},'rejected')">Reject</button></div>`; 
    }); 
  });
}
function updateOrder(id,status){ fetch("/order/status/"+id,{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({status})}).then(()=>loadOrders()); }

if(token) showDashboard();
</script>
</body>
</html>
