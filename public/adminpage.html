<!DOCTYPE html>
<html>
<head>
<title>Go Beyond Cafe - Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:Poppins,sans-serif;background:#f4f6f9;}
#dashboard {display:flex;height:100vh;display:none;}
#sidebar {width:70px;background:#3e2723;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
.sidebar-btn {width:50px;height:50px;margin:10px 0;border:none;border-radius:10px;background:#4e342e;color:white;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;position:relative;}
.sidebar-btn:hover{background:#6d4c41;}
.sidebar-btn span.tooltip {visibility:hidden;width:120px;background:#3e2723;color:white;text-align:center;border-radius:6px;padding:5px 0;position:absolute;left:60px;top:50%;transform:translateY(-50%);font-size:12px;z-index:1;}
.sidebar-btn:hover span.tooltip {visibility:visible;}
#sidebarButtons {display:none;flex-direction:column;align-items:center;}
#mainContent {flex:1;padding:20px;overflow-y:auto;}
.card {background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);}
button.primary{background:#3e2723;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
button.danger{background:#e53935;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
button.success{background:#4caf50;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:4px;}
.menu-item {display:flex;align-items:center;justify-content:space-between;margin:10px 0;padding:10px;border-bottom:1px solid #eee;}
.menu-item img {width:60px;height:50px;object-fit:cover;border-radius:6px;margin-right:10px;}
.flex{display:flex;align-items:center;}
#ordersSection,#menuListSection{display:block;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginForm">
  <h2>Go Beyond Cafe Admin</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password"><br>
  <button class="primary" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <button class="sidebar-btn" onclick="toggleSidebarMenu()">☰<span class="tooltip">Menu</span></button>
    <div id="sidebarButtons">
      <button class="sidebar-btn" onclick="showSection('qrSection')">📱<span class="tooltip">QR Code</span></button>
      <button class="sidebar-btn" onclick="showSection('addSection')">➕<span class="tooltip">Add Menu</span></button>
      <button class="sidebar-btn" onclick="showSection('recordSection')">🧾<span class="tooltip">Records</span></button>
      <button class="sidebar-btn" onclick="showSection('profileSection')">⚙️<span class="tooltip">Profile</span></button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <!-- QR -->
    <div id="qrSection" class="card" style="display:none">
      <h3>📱 QR Code</h3>
      <img id="qrImage" width="200"><br><br>
      <button class="primary" onclick="downloadQR()">Save QR Code</button>
    </div>

    <!-- ADD MENU -->
    <div id="addSection" class="card" style="display:none">
      <h3>➕ Add Menu Item</h3>
      <input id="name" placeholder="Item Name">
      <input id="price" type="number" placeholder="Price">
      <input type="file" id="imgFile" accept="image/*">
      <input id="imgUrl" placeholder="Or paste image URL">
      <button class="primary" onclick="addMenu()">Add Item</button>
      <div id="menuList"></div>
    </div>

    <!-- RECORDS -->
    <div id="recordSection" class="card" style="display:none">
      <h3>✅ Records of Orders</h3>
      <select onchange="filterRecords(this.value)">
        <option value="all">All</option>
        <option value="today">Today</option>
        <option value="week">Last Week</option>
        <option value="month">Last Month</option>
      </select>
      <div id="doneOrders"></div>
    </div>

    <!-- PROFILE -->
    <div id="profileSection" class="card" style="display:none">
      <h3>Profile Settings</h3>
      <input id="newPass" type="password" placeholder="New Password">
      <button class="primary" onclick="changePassword()">Change Password</button><br><br>
      <button class="danger" onclick="logout()">Logout</button>
    </div>

    <!-- ORDERS -->
    <div id="ordersSection" class="card">
      <h3>🧾 New Orders</h3>
      <div id="orders"></div>
    </div>

    <!-- MENU LIST -->
    <div id="menuListSection" class="card">
      <h3>📋 Menu List</h3>
      <div id="menuListMain"></div>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem("token");
let doneData = [];
let sidebarVisible = false;

/* LOGIN */
function login(){
  const username=document.getElementById("username").value;
  const password=document.getElementById("password").value;
  fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})})
  .then(r=>r.json()).then(data=>{
    if(data.token){
      token=data.token;
      localStorage.setItem("token",token);
      setTimeout(showDashboard,5000);
    } else alert("Login failed");
  });
}

/* DASHBOARD */
function showDashboard(){
  document.getElementById("loginForm").style.display="none";
  document.getElementById("dashboard").style.display="flex";
  generateQR();
  loadMenu();
  loadDoneOrders();
  loadOrders();
  hideAllSections();
}

/* TOGGLE SIDEBAR MENU */
function toggleSidebarMenu(){
  sidebarVisible = !sidebarVisible;
  document.getElementById("sidebarButtons").style.display = sidebarVisible ? "flex":"none";
}

/* SHOW SECTION */
function showSection(id){
  hideAllSections();
  document.getElementById(id).style.display="block";
}
function hideAllSections(){
  ['qrSection','addSection','recordSection','profileSection'].forEach(s=>document.getElementById(s).style.display="none");
}

/* PROFILE */
function changePassword(){
  const newPass=document.getElementById("newPass").value;
  fetch("/change-password",{method:"POST",
    headers:{"Content-Type":"application/json","Authorization":token},
    body:JSON.stringify({password:newPass})
  }).then(()=>alert("Password changed"));
}
function logout(){ localStorage.removeItem("token"); location.reload(); }

/* QR */
function generateQR(){
  const qrData = "https://go-beyond.onrender.com/";
  document.getElementById("qrImage").src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(qrData);
}
function downloadQR(){
  const link = document.createElement("a");
  link.href=document.getElementById("qrImage").src;
  link.download="GoBeyondCafe-QR.png";
  link.click();
}

/* MENU */
async function addMenu(){
  let img="";
  if(document.getElementById("imgFile").files[0]) img=await toBase64(document.getElementById("imgFile").files[0]);
  else if(document.getElementById("imgUrl").value) img=document.getElementById("imgUrl").value;
  else {alert("Add image"); return;}
  fetch("/menu",{method:"POST",
    headers:{"Content-Type":"application/json","Authorization":token},
    body:JSON.stringify({name:document.getElementById("name").value,price:document.getElementById("price").value,img})
  }).then(loadMenu);
}
function toBase64(file){return new Promise(res=>{let reader=new FileReader();reader.readAsDataURL(file);reader.onload=()=>res(reader.result);});}
function loadMenu(){
  fetch("/menu").then(r=>r.json()).then(data=>{
    const divMain=document.getElementById("menuListMain");
    divMain.innerHTML="";
    data.forEach(item=>{
      divMain.innerHTML+=`<div class="menu-item"><div class="flex"><img src="${item.img}"><span>${item.name} - ₱${item.price}</span></div></div>`;
    });
  });
}

/* ORDERS */
function loadDoneOrders(){
  fetch("/orders-done",{headers:{Authorization:token}}).then(r=>r.json()).then(data=>{
    doneData=data; displayFiltered("all");
  });
}
function displayFiltered(type){
  const div=document.getElementById("doneOrders");
  div.innerHTML="";
  let now=new Date();
  doneData.forEach(order=>{
    let orderDate=new Date(order.date||Date.now());
    let show=true;
    if(type==="today") show=orderDate.toDateString()===now.toDateString();
    if(type==="week"){let w=new Date(); w.setDate(now.getDate()-7); show=orderDate>=w;}
    if(type==="month"){let m=new Date(); m.setMonth(now.getMonth()-1); show=orderDate>=m;}
    if(show) div.innerHTML+=`<div class="card"><strong>${order.customer}</strong> ₱${order.total}</div>`;
  });
}
function filterRecords(value){displayFiltered(value);}

function loadOrders(){
  fetch("/orders",{headers:{Authorization:token}}).then(r=>r.json()).then(data=>{
    const div=document.getElementById("orders");
    div.innerHTML="";
    data.forEach(order=>{
      let items="";
      order.items.forEach(i=>items+=`${i.name} x${i.qty}<br>`);
      div.innerHTML+=`<div class="card"><strong>${order.customer}</strong><br>${items}Total: ₱${order.total}<br>
      <button class="success" onclick="markDone(${order.id})">Mark Done</button>
      <button class="danger" onclick="rejectOrder(${order.id})">Reject</button></div>`;
    });
  });
}

/* ACCEPT / REJECT ORDERS */
function markDone(id){
  fetch(`/order/done/${id}`,{method:"POST",headers:{Authorization:token}}).then(()=>loadOrders());
}
function rejectOrder(id){
  fetch(`/order/done/${id}`,{method:"POST",headers:{Authorization:token}}).then(()=>loadOrders());
}

/* AUTO LOGIN */
if(token) setTimeout(showDashboard,5000);

</script>
</body>
</html>
